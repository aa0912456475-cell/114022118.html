<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>個人履歷</title>

<style>
body {
    font-family: "Microsoft JhengHei", sans-serif;
    margin: 0;
    background: #f4f6f9;
}

.container {
    max-width: 900px;
    margin: 40px auto;
    background: white;
    padding: 30px;
    border-radius: 12px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

/* 頭部區域（照片 + 名字） */
.header {
    display: flex;
    align-items: center;
    gap: 20px;
}

/* 照片 */
.profile-img {
    width: 120px;
    height: 120px;
    object-fit: cover;
    border-radius: 50%;
    border: 3px solid #3498db;
}

/* 標題 */
h1 {
    margin: 0;
    color: #2c3e50;
}

.section {
    margin-top: 25px;
}

.section h2 {
    border-left: 5px solid #3498db;
    padding-left: 10px;
    color: #3498db;
}

p {
    margin: 6px 0;
}

ul {
    padding-left: 20px;
}

/* 手機版 */
@media (max-width: 600px) {
    .header {
        flex-direction: column;
        text-align: center;
    }
}
</style>

</head>

<body>

<div class="container">

    <div class="header">
        <!-- 照片 -->
        <img src="me.jpg" alt="個人照片" class="profile-img">

        <!-- 名字與基本資料 -->
        <div>
            <h1>（你的名字）</h1>
            <p>亞洲大學</p>
            <p>學號：114022118</p>
            <p>Email：（請填寫）</p>
        </div>
    </div>

    <div class="section">
        <h2>學歷</h2>
        <ul>
            <li>亞洲大學（就讀中）</li>
        </ul>
    </div>

    <div class="section">
        <h2>技能</h2>
        <ul>
            <li>HTML / CSS / JavaScript</li>
            <li>（自行補充）</li>
        </ul>
    </div>

    <div class="section">
        <h2>專案經驗</h2>
        <ul>
            <li>個人履歷網站製作</li>
        </ul>
    </div>

    <div class="section">
        <h2>自我介紹</h2>
        <p>
            我是亞洲大學的學生，對網頁設計與程式開發有興趣，
            持續學習並提升實作能力。
        </p>
    </div>

</div>

</body>
</html>
